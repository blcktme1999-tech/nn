<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>線上報案 - 公安便民入口</title>
  <style>
    :root { --red:#c90822; --deep-red:#a40018; --ink:#242424; --line:#d8d8d8; --paper:#f8f8f8; --muted:#707070; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); background:var(--paper); font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; }
    a { color:inherit; text-decoration:none; }
    .site-header { background:#fff; border-top:3px solid #1f1f1f; }
    .masthead, .nav-inner, main, .site-footer-inner { width:min(1100px, calc(100% - 32px)); margin:auto; }
    .masthead { min-height:96px; display:flex; align-items:center; justify-content:space-between; }
    .identity { display:flex; align-items:center; gap:15px; }
    .seal { width:50px; height:50px; border-radius:50%; display:grid; place-items:center; background:#d31024; color:#f8d64d; border:3px solid #f5cf45; font-size:26px; box-shadow:inset 0 0 0 2px #a90a19; }
    .title-group strong { display:block; color:#123c77; font-size:25px; letter-spacing:1px; line-height:1.25; }
    .title-group span { color:#777; font:12px/1.2 Georgia,serif; letter-spacing:.2px; }
    .return-home { border:1px solid #d7b8b8; border-radius:3px; color:#9c3340; padding:6px 12px; font-size:13px; }
    .nav-bar { background:var(--red); box-shadow:0 2px 4px #0002; }
    .nav-inner { display:flex; justify-content:space-between; }
    .nav-inner a { color:#fff; min-width:145px; padding:13px 24px; text-align:center; font-weight:700; font-size:15px; }
    .nav-inner a:hover, .nav-inner a.active { background:var(--deep-red); }
    main { min-height:670px; padding:42px 0 70px; }
    .service-panel { width:min(560px, 100%); margin:0 auto; background:#fff; border:1px solid #e3e3e3; border-top:4px solid var(--red); border-radius:7px 7px 3px 3px; box-shadow:0 5px 16px #00000018; padding:27px 32px 31px; }
    .service-panel h1 { margin:0; color:var(--red); text-align:center; font-size:24px; letter-spacing:1px; }
    .intro { margin:6px 0 25px; color:#9a9a9a; text-align:center; font-size:13px; }
    label { display:block; margin:15px 0 6px; color:#666; font-size:14px; font-weight:700; }
    input { width:100%; min-height:42px; padding:9px 12px; border:1px solid #bbb; border-radius:2px; color:#333; font:14px "Noto Sans TC","Microsoft JhengHei",sans-serif; background:#fff; box-shadow:inset 0 1px 3px #0000000d; }
    input:focus { outline:2px solid #d5223740; border-color:var(--red); }
    .privacy { margin:17px 0 0; color:#8d8d8d; font-size:12px; line-height:1.7; }
    .submit { width:100%; min-height:44px; margin-top:22px; border:0; border-radius:3px; color:#fff; background:var(--red); box-shadow:0 2px 5px #8a001430; font:700 16px "Noto Sans TC","Microsoft JhengHei",sans-serif; letter-spacing:8px; text-indent:8px; cursor:pointer; }
    .submit:hover { background:var(--deep-red); }
    .result { display:none; margin-top:16px; padding:10px 12px; border-left:3px solid #18864a; background:#edf9f1; color:#23633e; font-size:13px; line-height:1.6; }
    .result.show { display:block; }
    .result.error { border-color:#cd8a19; background:#fff8e7; color:#835812; }
    .callout { margin-top:18px; padding:12px 14px; border:1px solid #e5e7eb; border-radius:6px; background:#fafafa; color:#555; font-size:13px; line-height:1.7; }
    .site-footer { background:#f0f0f0; border-top:1px solid #ddd; color:#777; }
    .site-footer-inner { padding:17px 0; font-size:12px; text-align:center; }
    @media (max-width:640px) {
      .masthead { min-height:78px; }
      .seal { width:40px; height:40px; font-size:21px; }
      .title-group strong { font-size:18px; }
      .title-group span { display:none; }
      .return-home { padding:5px 8px; font-size:12px; }
      .nav-inner { overflow:auto; justify-content:flex-start; }
      .nav-inner a { min-width:auto; white-space:nowrap; padding:12px 16px; font-size:14px; }
      main { padding-top:28px; }
      .service-panel { padding:23px 22px 27px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="masthead">
      <a class="identity" href="index (2).html" aria-label="返回首頁">
        <span class="seal" aria-hidden="true">★</span>
        <span class="title-group"><strong>中華人民共和國公安部</strong><span>Ministry of Public Security of the People's Republic of China</span></span>
      </a>
      <a class="return-home" href="index (2).html">← 返回首頁</a>
    </div>
    <nav class="nav-bar"><div class="nav-inner">
      <a href="index (2).html">首頁</a><a class="active" href="mm1.html">便民服務</a><a href="case-search.html">案件查詢</a><a href="index (2).html">返回主站</a>
    </div></nav>
  </header>

  <main>
    <form id="reportForm" class="service-panel">
      <h1>線上報案</h1>
      <p class="intro">填入單位名稱與中文預設代碼後，即可進入視訊報案功能</p>
      <label for="unitName">單位名稱</label>
      <input id="unitName" required maxlength="40" placeholder="例如：刑事警察大隊">
      <label for="entryCode">後端預設代碼（中文）</label>
      <input id="entryCode" required maxlength="20" placeholder="請輸入：警民視訊接入" value="警民視訊接入">
      <div class="callout">預設代碼：<strong>警民視訊接入</strong>。輸入正確後，系統會自動跳轉到視訊後台頁。</div>
      <button class="submit" type="submit">進 入 視 訊</button>
      <div id="reportResult" class="result" aria-live="polite"></div>
    </form>
  </main>

  <footer class="site-footer"><div class="site-footer-inner">線上報案採用中文代碼驗證，完成後會導向視訊功能頁。</div></footer>

  <script>
    const form = document.querySelector('#reportForm');
    const unitName = document.querySelector('#unitName');
    const entryCode = document.querySelector('#entryCode');
    const result = document.querySelector('#reportResult');
    const presetCode = '警民視訊接入';

    function show(text, error) {
      result.textContent = text;
      result.className = 'result show' + (error ? ' error' : '');
    }

    // 忽略空白與常見標點，降低中文輸入法造成的比對失敗。
    function normalizeCode(value) {
      return value.replace(/\s+/g, '').replace(/[，。、「」『』,.]/g, '');
    }

    entryCode.value = presetCode;

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const unit = unitName.value.trim();
      const code = entryCode.value.trim();

      if (!unit || !code) {
        show('請先填寫單位名稱與中文代碼。', true);
        return;
      }

      if (normalizeCode(code) !== normalizeCode(presetCode)) {
        show('代碼錯誤，請輸入「警民視訊接入」。', true);
        return;
      }

      const target = 'video-room.html?unit=' + encodeURIComponent(unit) + '&code=' + encodeURIComponent(code);
      show('驗證成功，正在進入視訊功能...', false);
      setTimeout(() => { window.location.href = target; }, 500);
    });
  </script>
</body>
</html>
