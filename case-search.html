<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案件查詢 - 公安便民入口</title>
  <style>
    :root { --red:#c90822; --deep-red:#a40018; --ink:#242424; --line:#d8d8d8; --paper:#f8f8f8; --muted:#707070; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); background:var(--paper); font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; }
    a { color:inherit; text-decoration:none; }
    .site-header { background:#fff; border-top:3px solid #1f1f1f; }
    .masthead, .nav-inner, main, .site-footer-inner { width:min(1100px, calc(100% - 32px)); margin:auto; }
    .masthead { min-height:96px; display:flex; align-items:center; justify-content:space-between; }
    .identity { display:flex; align-items:center; gap:15px; }
    .seal { width:50px; height:50px; border-radius:50%; display:grid; place-items:center; background:#d31024; color:#f8d64d; border:3px solid #f5cf45; font-size:26px; box-shadow:inset 0 0 0 2px #a90a19; }
    .title-group strong { display:block; color:#123c77; font-size:25px; letter-spacing:1px; line-height:1.25; }
    .title-group span { color:#777; font:12px/1.2 Georgia,serif; letter-spacing:.2px; }
    .return-home { border:1px solid #d7b8b8; border-radius:3px; color:#9c3340; padding:6px 12px; font-size:13px; }
    .nav-bar { background:var(--red); box-shadow:0 2px 4px #0002; }
    .nav-inner { display:flex; justify-content:space-between; }
    .nav-inner a { color:#fff; min-width:145px; padding:13px 24px; text-align:center; font-weight:700; font-size:15px; }
    .nav-inner a:hover, .nav-inner a.active { background:var(--deep-red); }
    main { min-height:670px; padding:42px 0 70px; }
    .query-panel { width:min(860px, 100%); margin:0 auto; background:#fff; border:1px solid #e3e3e3; border-top:4px solid var(--red); border-radius:7px 7px 3px 3px; box-shadow:0 5px 16px #00000018; padding:27px 32px 31px; }
    .query-panel h1 { margin:0; color:var(--red); text-align:center; font-size:24px; letter-spacing:1px; }
    .intro { margin:6px 0 25px; color:#9a9a9a; text-align:center; font-size:13px; }
    .field { margin-bottom:14px; }
    .field label { display:block; margin:0 0 6px; color:#666; font-size:14px; font-weight:700; }
    input { width:100%; min-height:42px; padding:9px 12px; border:1px solid #bbb; border-radius:2px; color:#333; font:14px "Noto Sans TC","Microsoft JhengHei",sans-serif; background:#fff; box-shadow:inset 0 1px 3px #0000000d; }
    input:focus { outline:2px solid #d5223740; border-color:var(--red); }
    .login-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .actions { margin-top:16px; }
    .submit { width:100%; min-height:44px; border:0; border-radius:3px; color:#fff; background:var(--red); box-shadow:0 2px 5px #8a001430; font:700 16px "Noto Sans TC","Microsoft JhengHei",sans-serif; letter-spacing:5px; text-indent:5px; cursor:pointer; }
    .submit:hover { background:var(--deep-red); }
    .hint { margin:14px 0 0; color:var(--muted); font-size:12px; line-height:1.6; }
    .msg { margin-top:14px; border-radius:4px; display:none; padding:10px 12px; font-size:13px; line-height:1.6; }
    .msg.show { display:block; }
    .msg.error { display:block; border:1px solid #f2d7a5; background:#fff8e7; color:#835812; }
    .msg.ok { display:block; border:1px solid #cfe7d5; background:#f2fbf4; color:#246f43; }
    .result { display:none; margin-top:18px; border:1px solid #ebebeb; border-radius:4px; overflow:hidden; }
    .result.show { display:block; }
    .result-head { background:#f8f8f8; padding:10px 12px; font-size:13px; color:#555; border-bottom:1px solid #ebebeb; }
    .profile { display:flex; gap:16px; align-items:flex-start; padding:16px 12px; border-bottom:1px solid #efefef; }
    .avatar { width:64px; height:64px; border-radius:50%; display:grid; place-items:center; background:#f0f0f0; color:#999; font-size:24px; overflow:hidden; flex:0 0 auto; }
    .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .profile-main { flex:1; }
    .profile-main h3 { margin:0; color:#123c77; font-size:20px; }
    .profile-main p { margin:6px 0 0; color:#666; font-size:13px; line-height:1.6; }
    .tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .tag { display:inline-block; padding:5px 9px; border:1px solid #e5e5e5; border-radius:999px; background:#fafafa; color:#555; font-size:12px; }
    .section { padding:14px 12px 16px; border-bottom:1px solid #efefef; }
    .section:last-child { border-bottom:0; }
    .section h4 { margin:0 0 10px; color:#123c77; font-size:15px; }
    .list { display:grid; gap:10px; }
    .item { padding:10px 12px; border:1px solid #ececec; border-radius:4px; background:#fff; }
    .item .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .item .title { font-weight:700; font-size:14px; }
    .item .detail { margin-top:6px; color:#555; font-size:13px; line-height:1.55; white-space:pre-wrap; }
    .item .time { color:#999; font-size:12px; white-space:nowrap; }
    .thumbs { display:grid; grid-template-columns:repeat(auto-fill, minmax(128px, 1fr)); gap:10px; }
    .thumb { border:1px solid #ececec; border-radius:4px; overflow:hidden; background:#fafafa; }
    .thumb img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
    .thumb .cap { padding:8px 9px; font-size:12px; color:#555; line-height:1.45; }
    .empty { color:#777; font-size:13px; line-height:1.6; }
    .site-footer { background:#f0f0f0; border-top:1px solid #ddd; color:#777; }
    .site-footer-inner { padding:17px 0; font-size:12px; text-align:center; }
    @media (max-width:700px) {
      .masthead { min-height:78px; }
      .seal { width:40px; height:40px; font-size:21px; }
      .title-group strong { font-size:18px; }
      .title-group span { display:none; }
      .return-home { padding:5px 8px; font-size:12px; }
      .nav-inner { overflow:auto; justify-content:flex-start; }
      .nav-inner a { min-width:auto; white-space:nowrap; padding:12px 16px; font-size:14px; }
      main { padding-top:28px; }
      .query-panel { padding:23px 22px 27px; }
      .login-grid { grid-template-columns:1fr; }
      .profile { flex-direction:column; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="masthead">
      <a class="identity" href="index (2).html" aria-label="返回首頁">
        <span class="seal" aria-hidden="true">★</span>
        <span class="title-group"><strong>中華人民共和國公安部</strong><span>Ministry of Public Security of the People's Republic of China</span></span>
      </a>
      <a class="return-home" href="index (2).html">← 返回首頁</a>
    </div>
    <nav class="nav-bar"><div class="nav-inner">
      <a href="index (2).html">首頁</a><a href="mm1.html">便民服務</a><a class="active" href="case-search.html">案件查詢</a><a href="index (2).html">返回主站</a>
    </div></nav>
  </header>

  <main>
    <section class="query-panel">
      <h1>案件查詢</h1>
      <p class="intro">輸入姓名與案件編號後，系統會自動顯示對應案件資料，無需登入。</p>

      <form id="loginForm">
        <div class="login-grid">
          <div class="field">
            <label for="loginId">姓名</label>
            <input id="loginId" autocomplete="name" placeholder="例如：明子">
          </div>
          <div class="field">
            <label for="password">案件編號</label>
            <input id="password" autocomplete="off" placeholder="例如：A-2026-0001">
          </div>
        </div>
        <div class="actions">
          <button class="submit" type="submit">查 詢</button>
        </div>
        <p class="hint">一般用戶只需填寫姓名與案件編號即可查詢，不需要建立帳號或登入。</p>
      </form>

      <div id="message" class="msg" aria-live="polite"></div>

      <div id="resultPanel" class="result" aria-live="polite">
        <div class="result-head">查詢結果</div>
        <div class="profile">
          <div class="avatar" id="avatarBox">?</div>
          <div class="profile-main">
            <h3 id="displayName">尚未查詢</h3>
            <p id="profileText">查詢後顯示你的個人資料與案件資訊。</p>
            <div class="tags" id="profileTags"></div>
          </div>
        </div>
        <div class="section">
          <h4>案件資訊</h4>
          <div id="recordsBox" class="list"><div class="empty">尚未載入資料。</div></div>
        </div>
        <div class="section">
          <h4>照片</h4>
          <div id="photosBox" class="thumbs"></div>
        </div>
        <div class="section">
          <h4>留言</h4>
          <div id="messagesBox" class="list"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer"><div class="site-footer-inner">案件查詢由後端代為讀取資料，一般用戶無需登入。</div></footer>

  <script>
    const loginForm = document.querySelector('#loginForm');
    const loginIdInput = document.querySelector('#loginId');
    const passwordInput = document.querySelector('#password');
    const messageBox = document.querySelector('#message');
    const resultPanel = document.querySelector('#resultPanel');
    const displayName = document.querySelector('#displayName');
    const profileText = document.querySelector('#profileText');
    const profileTags = document.querySelector('#profileTags');
    const avatarBox = document.querySelector('#avatarBox');
    const recordsBox = document.querySelector('#recordsBox');
    const photosBox = document.querySelector('#photosBox');
    const messagesBox = document.querySelector('#messagesBox');

    function showMessage(text, type = 'ok') {
      messageBox.textContent = text;
      messageBox.className = 'msg show ' + type;
    }

    function clearMessage() {
      messageBox.textContent = '';
      messageBox.className = 'msg';
    }

    function escapeText(value) {
      return String(value ?? '').replace(/[&<>\"]/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;'
      }[char] || char));
    }

    function fmtTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString('zh-Hant', { hour12: false });
    }

    function renderProfile(profile) {
      const name = profile?.display_name || '未命名使用者';
      const avatarUrl = profile?.avatar_url || '';
      const issuingPlace = profile?.issuing_place || '-';
      const idNumber = profile?.id_number || '-';

      displayName.textContent = name;
      profileText.innerHTML = '發證地：' + escapeText(issuingPlace) + '<br>證件號碼：' + escapeText(idNumber);
      profileTags.innerHTML = '';

      if (avatarUrl) {
        avatarBox.innerHTML = '<img alt="avatar" src="' + escapeText(avatarUrl) + '">';
      } else {
        avatarBox.textContent = (name || '?').trim().charAt(0) || '?';
      }
    }

    function renderRecords(records) {
      if (!records.length) {
        recordsBox.innerHTML = '<div class="empty">沒有找到案件資訊。</div>';
        return;
      }
      recordsBox.innerHTML = records.map((record) => {
        return '<div class="item">' +
          '<div class="top"><div class="title">' + escapeText(record.title || '未命名案件') + '</div><div class="time">' + fmtTime(record.created_at) + '</div></div>' +
          '<div class="detail">' + escapeText(record.info_text || '') + '</div>' +
        '</div>';
      }).join('');
    }

    function renderPhotos(photos) {
      if (!photos.length) {
        photosBox.innerHTML = '<div class="empty">沒有找到照片。</div>';
        return;
      }
      photosBox.innerHTML = photos.map((photo) => {
        return '<div class="thumb">' +
          '<img alt="photo" src="' + escapeText(photo.photo_url) + '">' +
          '<div class="cap">' + escapeText(photo.caption || '照片') + '</div>' +
        '</div>';
      }).join('');
    }

    function renderMessages(messages) {
      if (!messages.length) {
        messagesBox.innerHTML = '<div class="empty">沒有找到留言。</div>';
        return;
      }
      messagesBox.innerHTML = messages.map((message) => {
        return '<div class="item">' +
          '<div class="top"><div class="title">' + escapeText(message.sender_role || 'staff') + '</div><div class="time">' + fmtTime(message.created_at) + '</div></div>' +
          '<div class="detail">' + escapeText(message.message || '') + '</div>' +
        '</div>';
      }).join('');
    }

    async function requestJson(url, options) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const rawText = await response.text();
      let data = {};
      try {
        data = rawText ? JSON.parse(rawText) : {};
      } catch (_) {
        data = {};
      }
      if (!response.ok) {
        throw new Error(data.error || ('請求失敗（HTTP ' + response.status + '）。'));
      }
      return data;
    }

    function renderResult(data) {
      const profile = data.profile || {};
      const records = data.records || [];

      renderProfile(profile);
      renderRecords(records);

      renderPhotos(data.photos || []);
      renderMessages(data.messages || []);

      resultPanel.classList.add('show');
      showMessage('已找到對應案件資料。', 'ok');
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();
      resultPanel.classList.remove('show');

      const displayNameValue = loginIdInput.value.trim();
      const caseNumber = passwordInput.value.trim();

      if (!displayNameValue || !caseNumber) {
        showMessage('請先輸入姓名與案件編號。', 'error');
        return;
      }

      try {
        const data = await requestJson('/api/case-search', {
          method: 'POST',
          body: JSON.stringify({ displayName: displayNameValue, caseNumber })
        });
        renderResult(data);
      } catch (error) {
        showMessage('查詢失敗：' + (error?.message || '未知錯誤'), 'error');
      }
    });
  </script>
</body>
</html>
